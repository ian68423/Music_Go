<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九宮格互動網頁 - 專業 Live 演出版</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>

    <video id="bg-video" autoplay loop muted playsinline>
        <source src="background.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

    <div class="sidebar sidebar-left">
        <div class="sidebar-header">基本節拍 (Rhythms)</div>
        <div class="scroll-list" id="rhythm-list-container">
            <div style="color: #888; text-align: center; margin-top: 20px; font-size: 0.9rem;">請先選擇右側歌曲</div>
        </div>
    </div>

    <div class="main-workspace">
        <div class="sequencer-wrapper">
            <div class="track-container">
                <div class="track-label" id="track-current-label"></div>
                <div class="track" id="track-current">
                    <div class="playhead" id="playhead-current"></div>
                    <div id="notes-current"></div>
                </div>
            </div>
            <div class="track-container">
                <div class="track-label" id="track-queued-label"></div>
                <div class="track disabled" id="track-queued">
                    <div id="notes-queued"></div>
                </div>
            </div>
        </div>

        <div class="grid-container">
            <div class="box-wrapper">
                <div class="box" id="box-7"></div>
                <div class="approach-container" id="approach-7"></div>
            </div>
            <div class="box-wrapper">
                <div class="box" id="box-8"></div>
                <div class="approach-container" id="approach-8"></div>
            </div>
            <div class="box-wrapper">
                <div class="box" id="box-9"></div>
                <div class="approach-container" id="approach-9"></div>
            </div>
            <div class="box-wrapper">
                <div class="box" id="box-4"></div>
                <div class="approach-container" id="approach-4"></div>
            </div>
            <div class="box-wrapper">
                <div class="box" id="box-5"></div>
                <div class="approach-container" id="approach-5"></div>
            </div>
            <div class="box-wrapper">
                <div class="box" id="box-6"></div>
                <div class="approach-container" id="approach-6"></div>
            </div>
            <div class="box-wrapper">
                <div class="box" id="box-1"></div>
                <div class="approach-container" id="approach-1"></div>
            </div>
            <div class="box-wrapper">
                <div class="box" id="box-2"></div>
                <div class="approach-container" id="approach-2"></div>
            </div>
            <div class="box-wrapper">
                <div class="box" id="box-3"></div>
                <div class="approach-container" id="approach-3"></div>
            </div>
        </div>
    </div>

    <div class="sidebar sidebar-right">
        <div class="sidebar-header">播放清單 (待命區)</div>
        <div class="scroll-list" id="playlist-container">
        </div>
    </div>

</body>
</html>
